<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventarisasi Dokumen - SEHATI</title>
    
    <script>
        // Keamanan: Cek sesi persis seperti di dashboard
        (function() {
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            const currentDomain = window.location.hostname;
            
            const isLocal = currentDomain === "localhost" || currentDomain === "127.0.0.1" || currentDomain === "";
            
            // Jika belum login dan bukan di localhost, kembalikan ke halaman login
            if (!isLoggedIn && !isLocal) {
                window.location.href = 'index.html'; 
            }
        })();
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = { 
            theme: { 
                extend: { 
                    colors: { navy: '#0f172a', darkblue: '#1e293b', skyblue: '#38bdf8' }, 
                    fontFamily: { sans: ['Inter', 'sans-serif'] } 
                } 
            } 
        }
    </script>
</head>
<body class="bg-navy min-h-screen font-sans text-slate-200 selection:bg-skyblue/30">

    <nav class="bg-darkblue/80 border-b border-slate-700/80 sticky top-0 z-10 backdrop-blur-md shadow-lg">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-skyblue to-blue-600 p-2.5 rounded-xl shadow-[0_0_15px_rgba(56,189,248,0.3)]">
                        <i class="fa-solid fa-link text-white text-sm"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-white leading-tight flex items-center gap-2">
                            Inventarisasi Dokumen
                            <span id="badgeOffline" class="hidden bg-rose-500/20 text-rose-400 text-[9px] px-2 py-0.5 rounded border border-rose-500/30 uppercase tracking-widest">Offline</span>
                        </h1>
                        <p class="text-[9px] text-skyblue font-bold uppercase tracking-widest">Portal Referensi Cloud</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="hidden md:flex flex-col items-end mr-2">
                        <span id="userNameDisplay" class="text-sm font-bold text-white">Memuat...</span>
                        <span id="userRoleBadge" class="text-[9px] px-2 py-0.5 rounded-full font-bold uppercase border mt-1 bg-slate-800 text-slate-400 border-slate-600">
                            Akses: ...
                        </span>
                    </div>
                    <button id="btnDashboard" class="p-2 text-slate-400 hover:bg-skyblue/10 hover:text-skyblue rounded-xl transition-all flex items-center border border-transparent hover:border-skyblue/20">
                        <i class="fa-solid fa-right-from-bracket rotate-180"></i>
                        <span class="ml-2 text-xs font-bold uppercase tracking-wider hidden sm:block">Dashboard</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div id="mainGrid" class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- PANEL KIRI: FORM UPLOAD (Khusus Admin) -->
            <div id="uploadPanel" class="hidden lg:col-span-1">
                <div class="bg-darkblue/60 backdrop-blur-md p-6 rounded-2xl border border-slate-700/50 mb-6 shadow-xl relative overflow-hidden">
                    <div class="absolute -top-10 -right-10 w-32 h-32 bg-skyblue/10 rounded-full blur-2xl pointer-events-none"></div>
                    
                    <div class="flex items-center mb-5 pb-4 border-b border-slate-700/80">
                        <i class="fa-solid fa-circle-plus text-skyblue text-lg mr-3"></i>
                        <h2 class="text-base font-bold text-white">Tambahkan Tautan</h2>
                    </div>
                    
                    <div id="alertBox" class="hidden bg-red-500/10 border border-red-500/30 text-red-400 p-3 rounded-xl mb-5 flex items-center text-xs">
                        <i class="fa-solid fa-circle-exclamation mr-2 text-sm"></i>
                        <span id="alertText">Error message</span>
                    </div>

                    <form id="uploadForm" class="space-y-5">
                        <div class="space-y-1.5 relative">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">
                                Penamaan File Referensi
                            </label>
                            <input type="text" id="inputDocName" placeholder="Ketik nama dokumen..." class="w-full bg-navy/80 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-skyblue transition-all" required>
                        </div>

                        <div class="space-y-1.5 relative">
                            <label class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] ml-1">
                                Tautan Google Drive
                            </label>
                            <input type="url" id="inputLink" placeholder="https://drive.google.com/file/d/..." class="w-full bg-navy/80 border border-slate-600 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-skyblue transition-all">
                        </div>

                        <button type="submit" id="btnSubmit" class="w-full bg-skyblue/10 text-skyblue border border-skyblue/30 hover:bg-skyblue hover:text-navy hover:border-skyblue hover:shadow-[0_0_15px_rgba(56,189,248,0.4)] px-6 py-3.5 rounded-xl font-bold uppercase tracking-wider text-xs transition-all flex items-center justify-center gap-2 group mt-2">
                            <i class="fa-solid fa-cloud-arrow-up group-hover:-translate-y-0.5 transition-transform"></i>
                            <span id="btnSubmitText">Simpan ke Cloud</span>
                        </button>
                    </form>
                </div>
            </div>

            <!-- PANEL KANAN: TABEL DAFTAR DOKUMEN -->
            <div id="tablePanel" class="lg:col-span-3">
                <div class="bg-darkblue/60 backdrop-blur-md rounded-2xl border border-slate-700/50 overflow-hidden shadow-xl">
                    
                    <!-- Header Tabel & Filter/Sort -->
                    <div class="p-5 md:p-6 border-b border-slate-700/80 flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <h2 class="text-base font-bold text-white flex items-center gap-2 flex-shrink-0">
                            <i class="fa-solid fa-folder-tree text-slate-400"></i> Repositori Referensi
                        </h2>
                        
                        <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                            <!-- Dropdown Sort -->
                            <div class="relative group">
                                <i class="fa-solid fa-arrow-down-short-wide absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm pointer-events-none"></i>
                                <select id="sortSelect" class="pl-9 pr-8 py-2.5 bg-navy/80 border border-slate-600 rounded-xl text-sm text-white focus:border-skyblue outline-none appearance-none transition-all cursor-pointer w-full sm:w-auto">
                                    <option value="newest">Terbaru</option>
                                    <option value="oldest">Terlama</option>
                                    <option value="name_asc">Nama (A - Z)</option>
                                    <option value="name_desc">Nama (Z - A)</option>
                                </select>
                                <div class="absolute inset-y-0 right-0 flex items-center px-3 pointer-events-none text-slate-500">
                                    <i class="fa-solid fa-chevron-down text-xs"></i>
                                </div>
                            </div>

                            <!-- Search Input -->
                            <div class="relative group flex-grow md:flex-grow-0">
                                <i class="fa-solid fa-magnifying-glass absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-500 text-sm group-focus-within:text-skyblue transition-colors"></i>
                                <input type="text" id="searchInput" placeholder="Cari dokumen..." class="pl-10 pr-4 py-2.5 bg-navy/80 border border-slate-600 rounded-xl text-sm text-white focus:border-skyblue outline-none w-full md:w-64 transition-all">
                            </div>
                        </div>
                    </div>

                    <div class="overflow-x-auto min-h-[400px]">
                        <table class="w-full text-left text-sm text-slate-300">
                            <thead class="bg-navy/60 text-slate-400 text-[10px] uppercase tracking-[0.15em] font-bold">
                                <tr>
                                    <th class="px-6 py-4 rounded-tl-lg">Nama File (Tautan G-Drive)</th>
                                    <th class="px-6 py-4 hidden sm:table-cell">Unit / Instansi</th>
                                    <th class="px-6 py-4">Akses</th>
                                    <th class="px-6 py-4 hidden md:table-cell">Tanggal</th>
                                    <!-- Kolom Aksi Hanya Muncul Jika Admin -->
                                    <th id="thAction" class="px-6 py-4 text-right hidden">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="tableBody" class="divide-y divide-slate-700/50">
                                <tr id="rowLoading">
                                    <td colspan="5" class="px-6 py-16 text-center">
                                        <div class="flex flex-col items-center justify-center space-y-4">
                                            <div class="w-10 h-10 border-4 border-slate-700 border-t-skyblue rounded-full animate-spin"></div>
                                            <span class="text-xs text-skyblue font-bold uppercase tracking-widest animate-pulse">Menghubungkan ke Cloud...</span>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <!-- Modal Konfirmasi Hapus Dokumen -->
    <div id="deleteModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-navy/80 backdrop-blur-sm">
        <div class="bg-darkblue border border-slate-700 p-6 rounded-2xl shadow-2xl max-w-sm w-full mx-4 transform scale-95 transition-transform duration-200" id="deleteModalContent">
            <div class="flex items-center justify-center w-12 h-12 rounded-full bg-rose-500/20 text-rose-500 mb-4 mx-auto border border-rose-500/30">
                <i class="fa-solid fa-triangle-exclamation text-xl"></i>
            </div>
            <h3 class="text-lg font-bold text-white text-center mb-2">Hapus Dokumen?</h3>
            <p class="text-sm text-slate-400 text-center mb-4" id="deleteModalText">Dokumen akan dihapus secara permanen.</p>
            <p id="deleteErrorMsg" class="text-rose-500 text-xs hidden mb-4 text-center font-semibold"></p>
            
            <div class="flex gap-3 mt-6">
                <button id="btnCancelDelete" class="flex-1 px-4 py-2.5 bg-slate-700/50 hover:bg-slate-700 text-white text-sm font-semibold rounded-xl transition-colors">Batal</button>
                <button id="btnConfirmDelete" class="flex-1 px-4 py-2.5 bg-rose-500 hover:bg-rose-600 text-white text-sm font-semibold rounded-xl transition-colors flex items-center justify-center gap-2">
                    <i class="fa-solid fa-trash-can"></i> Hapus
                </button>
            </div>
        </div>
    </div>

    <script type="module">
        // IMPORT FUNGSI FIREBASE DARI CDN, MENAMBAHKAN doc & deleteDoc UNTUK FITUR HAPUS
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // KONFIGURASI FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDlraVPXwrgMRgnk87AE_Ns8aHi4djxQhs",
            authDomain: "referensi-sehati.firebaseapp.com",
            projectId: "referensi-sehati",
            storageBucket: "referensi-sehati.firebasestorage.app",
            messagingSenderId: "476416992343",
            appId: "1:476416992343:web:b6d19a8f3ae8039bd4af12"
        };

        // VARIABEL GLOBAL
        let db;
        let allDocuments = []; 
        let docToDeleteId = null; // Menyimpan ID dokumen yang akan dihapus
        
        let userRole = sessionStorage.getItem('kategori') || 'Tamu';
        
        // Konversi otomatis jika yang masuk adalah Dinkes, maka dianggap Admin
        if (userRole === 'Dinkes') {
            userRole = 'Admin';
        }

        const userName = sessionStorage.getItem('unitKerja') || 'Pengguna Tidak Dikenal';
        
        const canUpload = userRole === 'Admin';
        const isAdmin = userRole === 'Admin';

        // 1. PENGATURAN UI & LOGIC AWAL
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('userNameDisplay').textContent = userName;
            const badge = document.getElementById('userRoleBadge');
            badge.textContent = `AKSES: ${userRole}`;
            
            // Hapus pewarnaan Dinkes, sisakan Admin dkk
            if (userRole === 'Admin') badge.className = "text-[9px] px-2 py-0.5 rounded-full font-bold uppercase border mt-1 bg-purple-500/20 text-purple-400 border-purple-500/30";
            else if (userRole === 'Puskesmas') badge.className = "text-[9px] px-2 py-0.5 rounded-full font-bold uppercase border mt-1 bg-emerald-500/20 text-emerald-400 border-emerald-500/30";
            else if (userRole === 'Klinik') badge.className = "text-[9px] px-2 py-0.5 rounded-full font-bold uppercase border mt-1 bg-sky-500/20 text-sky-400 border-sky-500/30";
            else if (userRole === 'Rumah Sakit') badge.className = "text-[9px] px-2 py-0.5 rounded-full font-bold uppercase border mt-1 bg-rose-500/20 text-rose-400 border-rose-500/30";

            document.getElementById('btnDashboard').addEventListener('click', () => {
                window.location.href = 'dashboard.html'; 
            });

            // Atur Layout
            const uploadPanel = document.getElementById('uploadPanel');
            const tablePanel = document.getElementById('tablePanel');
            
            if (canUpload) {
                uploadPanel.classList.remove('hidden');
                tablePanel.className = "lg:col-span-2"; 
            } else {
                uploadPanel.classList.add('hidden');
                tablePanel.className = "lg:col-span-3";
            }

            // Tampilkan Header Kolom Aksi Jika Admin
            if (isAdmin) {
                document.getElementById('thAction').classList.remove('hidden');
            }
            
            initFirebaseAndFetchData();
        });

        // 2. MENGAMBIL DATA FIREBASE
        async function initFirebaseAndFetchData() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                
                const referensiQuery = query(collection(db, "referensi"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(referensiQuery);
                
                allDocuments = [];
                querySnapshot.forEach((doc) => {
                    allDocuments.push({ id: doc.id, ...doc.data() });
                });
                
                updateTableDisplay(); // Render dengan filter dan sort default

            } catch (error) {
                console.error("Gagal terhubung:", error);
                document.getElementById('badgeOffline').classList.remove('hidden');
                document.getElementById('rowLoading').innerHTML = `
                    <td colspan="${isAdmin ? 5 : 4}" class="px-6 py-12 text-center text-slate-500">
                        <i class="fa-solid fa-triangle-exclamation text-rose-500 text-3xl mb-3 opacity-50 block"></i>
                        Gagal memuat data. Sistem tidak terhubung.
                    </td>`;
            }
        }

        // 3. FUNGSI UTILITAS UNTUK SORTING TANGGAL (Firestore Timestamp vs JS Date)
        function getMillis(d) {
            if (!d) return 0;
            if (d.toMillis) return d.toMillis();
            if (d.getTime) return d.getTime();
            if (typeof d === 'string') return new Date(d).getTime();
            return 0;
        }

        // 4. FUNGSI MENGURUTKAN DATA
        function sortDocuments(docs, sortBy) {
            let sortedDocs = [...docs];
            switch(sortBy) {
                case 'newest':
                    sortedDocs.sort((a, b) => getMillis(b.createdAt) - getMillis(a.createdAt));
                    break;
                case 'oldest':
                    sortedDocs.sort((a, b) => getMillis(a.createdAt) - getMillis(b.createdAt));
                    break;
                case 'name_asc':
                    sortedDocs.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'name_desc':
                    sortedDocs.sort((a, b) => b.name.localeCompare(a.name));
                    break;
            }
            return sortedDocs;
        }

        // 5. FUNGSI FILTER & RENDER KESELURUHAN (Dipanggil saat Search / Sort)
        function updateTableDisplay() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const sortBy = document.getElementById('sortSelect').value;
            
            // 1. Filter
            let filteredDocs = allDocuments.filter(doc => 
                doc.name.toLowerCase().includes(searchTerm) || 
                doc.uploaderName.toLowerCase().includes(searchTerm)
            );
            
            // 2. Sort
            let processedDocs = sortDocuments(filteredDocs, sortBy);
            
            // 3. Render
            renderTable(processedDocs);
        }

        // Event Listener untuk Search & Sort
        document.getElementById('searchInput').addEventListener('input', updateTableDisplay);
        document.getElementById('sortSelect').addEventListener('change', updateTableDisplay);

        // 6. RENDER KE TABEL HTML
        function renderTable(dataArray) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 
            
            const colCount = isAdmin ? 5 : 4;

            if (dataArray.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="${colCount}" class="px-6 py-12 text-center text-slate-500 text-sm">
                            <i class="fa-solid fa-inbox text-2xl block mb-2 opacity-50"></i>
                            Tidak ada dokumen yang ditemukan.
                        </td>
                    </tr>`;
                return;
            }

            dataArray.forEach(doc => {
                // Paksa data lama yang bersatus Dinkes agar ditampilkan sebagai Admin di tabel
                let displayRole = doc.uploaderRole === 'Dinkes' ? 'Admin' : doc.uploaderRole;
                
                let badgeClass = "bg-slate-500/20 text-slate-400 border-slate-500/30";
                if (displayRole === 'Admin') badgeClass = 'bg-purple-500/20 text-purple-400 border-purple-500/30';
                else if (displayRole === 'Puskesmas') badgeClass = 'bg-emerald-500/20 text-emerald-400 border-emerald-500/30';
                else if (displayRole === 'Klinik') badgeClass = 'bg-sky-500/20 text-sky-400 border-sky-500/30';
                else if (displayRole === 'Rumah Sakit') badgeClass = 'bg-rose-500/20 text-rose-400 border-rose-500/30';

                let displayDate = doc.date || "-";
                
                // Siapkan Kolom Aksi (Tombol Hapus Khusus Admin)
                let actionTd = '';
                if (isAdmin) {
                    // Escape nama dokumen agar aman dimasukkan ke pemanggilan fungsi JS
                    const safeName = doc.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    actionTd = `
                        <td class="px-6 py-4 text-right">
                            <button onclick="window.openDeleteModal('${doc.id}', '${safeName}')" class="text-slate-500 hover:text-rose-500 hover:bg-rose-500/10 p-2 rounded-lg transition-colors border border-transparent hover:border-rose-500/30" title="Hapus Dokumen">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    `;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-700/30 transition-colors group";
                tr.innerHTML = `
                    <td class="px-6 py-4">
                        <a href="${doc.link}" target="_blank" rel="noopener noreferrer" class="flex items-start md:items-center text-skyblue font-semibold hover:text-white transition-colors">
                            <i class="fa-solid fa-file-lines text-slate-500 mr-3 mt-1 md:mt-0 group-hover:text-skyblue transition-colors"></i>
                            <span class="line-clamp-2 pr-2">${doc.name}</span>
                            <i class="fa-solid fa-arrow-up-right-from-square text-[10px] opacity-0 group-hover:opacity-100 transition-opacity ml-auto md:ml-0 flex-shrink-0"></i>
                        </a>
                    </td>
                    <td class="px-6 py-4 font-medium text-slate-300 hidden sm:table-cell">${doc.uploaderName}</td>
                    <td class="px-6 py-4">
                        <span class="px-2 py-1 rounded-full text-[9px] font-bold uppercase tracking-wider border whitespace-nowrap ${badgeClass}">
                            ${displayRole}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-slate-500 text-xs hidden md:table-cell whitespace-nowrap">${displayDate}</td>
                    ${actionTd}
                `;
                tbody.appendChild(tr);
            });
        }

        // 7. FUNGSI MENYIMPAN DATA (UPLOAD FORM)
        if (canUpload) {
            const form = document.getElementById('uploadForm');
            const alertBox = document.getElementById('alertBox');
            const alertText = document.getElementById('alertText');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                alertBox.classList.add('hidden'); 

                const docName = document.getElementById('inputDocName').value;
                const docLink = document.getElementById('inputLink').value;

                if (!docName || docName.trim() === '') {
                    alertText.textContent = "Silakan isi nama dokumen referensi.";
                    alertBox.classList.remove('hidden'); return;
                }
                
                if (!docLink.trim() || (!docLink.startsWith('http://') && !docLink.startsWith('https://'))) {
                    alertText.textContent = "Tautan harus valid dan diawali dengan http:// atau https://";
                    alertBox.classList.remove('hidden'); return;
                }

                const btnSubmit = document.getElementById('btnSubmit');
                
                btnSubmit.disabled = true;
                btnSubmit.classList.add('opacity-70', 'cursor-not-allowed');
                btnSubmit.innerHTML = `<div class="w-4 h-4 border-2 border-slate-500 border-t-white rounded-full animate-spin"></div> Menyimpan...`;

                try {
                    const today = new Date().toISOString().split('T')[0];
                    const newDoc = {
                        name: docName,
                        link: docLink,
                        uploaderRole: userRole,
                        uploaderName: userName,
                        date: today,
                        createdAt: serverTimestamp() 
                    };

                    const docRef = await addDoc(collection(db, "referensi"), newDoc);
                    
                    // Tambahkan createdAt lokal sementara untuk kebutuhan pengurutan
                    const newDocToDisplay = { id: docRef.id, ...newDoc, createdAt: new Date() };
                    allDocuments.push(newDocToDisplay); 
                    
                    updateTableDisplay(); // Render ulang sesuai filter dan sort
                    
                    document.getElementById('inputDocName').value = "";
                    document.getElementById('inputLink').value = "";

                } catch (error) {
                    console.error("Gagal menambah dokumen: ", error);
                    alertText.textContent = "Terjadi kesalahan sistem. Pastikan koneksi internet stabil.";
                    alertBox.classList.remove('hidden');
                } finally {
                    btnSubmit.disabled = false;
                    btnSubmit.classList.remove('opacity-70', 'cursor-not-allowed');
                    btnSubmit.innerHTML = `<i class="fa-solid fa-cloud-arrow-up group-hover:-translate-y-0.5 transition-transform"></i> <span id="btnSubmitText">Simpan ke Cloud</span>`;
                }
            });
        }

        // 8. LOGIKA MODAL HAPUS (KHUSUS ADMIN)
        window.openDeleteModal = (id, name) => {
            docToDeleteId = id;
            document.getElementById('deleteModalText').innerHTML = `Dokumen <b>"${name}"</b> akan dihapus secara permanen.`;
            document.getElementById('deleteErrorMsg').classList.add('hidden');
            
            const modal = document.getElementById('deleteModal');
            const modalContent = document.getElementById('deleteModalContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            // Sedikit delay untuk efek animasi scale
            setTimeout(() => {
                modalContent.classList.remove('scale-95');
                modalContent.classList.add('scale-100');
            }, 10);
        };

        const closeDeleteModal = () => {
            const modal = document.getElementById('deleteModal');
            const modalContent = document.getElementById('deleteModalContent');
            
            modalContent.classList.remove('scale-100');
            modalContent.classList.add('scale-95');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                docToDeleteId = null;
            }, 200);
        };

        document.getElementById('btnCancelDelete').addEventListener('click', closeDeleteModal);

        document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
            if (!docToDeleteId) return;
            
            const btn = document.getElementById('btnConfirmDelete');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Menghapus...`;
            btn.disabled = true;
            document.getElementById('deleteErrorMsg').classList.add('hidden');

            try {
                // Proses hapus ke Firestore
                await deleteDoc(doc(db, "referensi", docToDeleteId));
                
                // Hapus dari array lokal
                allDocuments = allDocuments.filter(d => d.id !== docToDeleteId);
                
                // Render ulang tabel
                updateTableDisplay();
                closeDeleteModal();
                
            } catch (error) {
                console.error("Gagal menghapus:", error);
                const errorEl = document.getElementById('deleteErrorMsg');
                errorEl.textContent = "Gagal menghapus dokumen dari Cloud. Pastikan hak akses Anda.";
                errorEl.classList.remove('hidden');
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });

    </script>
</body>
</html>
