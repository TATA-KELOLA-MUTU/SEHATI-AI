    <script>
        (function() {
            // 1. KEAMANAN DOMAIN (LISENSI)
            const allowedDomains = [
                "tata-kelola-mutu.github.io",
                "domain-kedua-anda.github.io" // Silakan ganti dengan repo kedua
            ];
            const currentDomain = window.location.hostname.toLowerCase();
            const isLocal = currentDomain === "localhost" || currentDomain === "127.0.0.1" || currentDomain === "";
            const isCanvasPreview = window.self !== window.top || currentDomain.includes("google") || currentDomain.includes("sandbox");
            
            if (!allowedDomains.includes(currentDomain) && !isLocal && !isCanvasPreview) {
                document.documentElement.innerHTML = `
                    <div style="display:flex; justify-content:center; align-items:center; height:100vh; background-color:#fdfbf7; color:#ca5c30; font-family:sans-serif; text-align:center; padding:20px;">
                        <div>
                            <h1 style="font-size:1.8rem; margin-bottom:10px;">⚠️ AKSES DITOLAK</h1>
                            <p style="color:#4a5568">Lisensi SEHATI tidak valid untuk domain ini.</p>
                        </div>
                    </div>`;
                throw new Error("Unauthorized Access");
            }

            // 2. KEAMANAN SESI (LOGIN)
            const isLoggedIn = sessionStorage.getItem('isLoggedIn');
            
            // Jika belum login dan bukan di localhost/preview, kembalikan ke halaman login
            if (!isLoggedIn && !isLocal && !isCanvasPreview) {
                window.location.href = 'index.html'; // Sesuaikan jika nama file login Anda berbeda
            }
        })();
    </script>

    <script type="module">
        // IMPORT FUNGSI FIREBASE DARI CDN
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, serverTimestamp, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // KONFIGURASI FIREBASE (TIDAK DIUBAH)
        const firebaseConfig = {
            apiKey: "AIzaSyDlraVPXwrgMRgnk87AE_Ns8aHi4djxQhs",
            authDomain: "referensi-sehati.firebaseapp.com",
            projectId: "referensi-sehati",
            storageBucket: "referensi-sehati.firebasestorage.app",
            messagingSenderId: "476416992343",
            appId: "1:476416992343:web:b6d19a8f3ae8039bd4af12"
        };

        // VARIABEL GLOBAL
        let db;
        let allDocuments = []; 
        let docToDeleteId = null; 
        
        let userRole = sessionStorage.getItem('kategori') || 'Tamu';
        if (userRole === 'Dinkes') {
            userRole = 'Admin';
        }

        const userName = sessionStorage.getItem('unitKerja') || 'Pengguna Tidak Dikenal';
        const canUpload = userRole === 'Admin';
        const isAdmin = userRole === 'Admin';

        // 1. PENGATURAN UI & LOGIC AWAL
        document.addEventListener("DOMContentLoaded", () => {
            document.getElementById('userNameDisplay').textContent = userName;
            const badge = document.getElementById('userRoleBadge');
            badge.textContent = `AKSES: ${userRole}`;
            
            // Penyesuaian warna badge untuk Navbar Terracotta (dibuat putih transparan agar kontras dan elegan)
            let badgeBaseClass = "text-[10px] px-2.5 py-0.5 rounded-full font-bold uppercase border mt-1 backdrop-blur-sm shadow-sm ";
            if (userRole === 'Admin') badge.className = badgeBaseClass + "bg-white/25 text-white border-white/40";
            else badge.className = badgeBaseClass + "bg-white/15 text-white/90 border-white/20";

            document.getElementById('btnDashboard').addEventListener('click', () => {
                window.location.href = 'dashboard.html'; 
            });

            const uploadPanel = document.getElementById('uploadPanel');
            const tablePanel = document.getElementById('tablePanel');
            
            if (canUpload) {
                uploadPanel.classList.remove('hidden');
                tablePanel.className = "lg:col-span-2"; 
            } else {
                uploadPanel.classList.add('hidden');
                tablePanel.className = "lg:col-span-3";
            }

            if (isAdmin) {
                document.getElementById('thAction').classList.remove('hidden');
            }
            
            initFirebaseAndFetchData();
        });

        // LOGIKA FLOATING SELECT (Menggantikan tag <select>)
        const sortTrigger = document.getElementById('sortTrigger');
        const sortModal = document.getElementById('floatingSelectModal');
        const sortContent = document.getElementById('floatingSelectContent');
        const hiddenSortSelect = document.getElementById('sortSelect');
        const sortDisplayText = document.getElementById('sortDisplayText');
        const sortOptions = document.querySelectorAll('.sort-option');
        const closeSortBtns = [document.getElementById('closeFloatingSelectBtn'), document.getElementById('closeFloatingSelectIcon')];

        function openSortModal() {
            sortModal.classList.remove('hidden');
            sortModal.classList.add('flex');
            
            // Update active state di modal
            sortOptions.forEach(btn => {
                const icon = btn.querySelector('.check-icon');
                if(btn.dataset.value === hiddenSortSelect.value) {
                    btn.classList.add('bg-sehati-primary/10', 'text-sehati-primary');
                    btn.classList.remove('hover:bg-gray-50');
                    icon.classList.remove('hidden');
                } else {
                    btn.classList.remove('bg-sehati-primary/10', 'text-sehati-primary');
                    btn.classList.add('hover:bg-gray-50');
                    icon.classList.add('hidden');
                }
            });

            setTimeout(() => {
                sortContent.classList.remove('scale-95', 'opacity-0');
                sortContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        }

        function closeSortModal() {
            sortContent.classList.remove('scale-100', 'opacity-100');
            sortContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                sortModal.classList.add('hidden');
                sortModal.classList.remove('flex');
            }, 200);
        }

        sortTrigger.addEventListener('click', openSortModal);
        closeSortBtns.forEach(btn => btn.addEventListener('click', closeSortModal));

        // Event saat opsi dipilih di Floating Select
        sortOptions.forEach(btn => {
            btn.addEventListener('click', function() {
                const value = this.dataset.value;
                const label = this.dataset.label;
                
                // Ubah nilai input hidden & text display
                hiddenSortSelect.value = value;
                sortDisplayText.textContent = label;
                
                // TRIGGER event change secara manual agar logika bawaan merespon
                hiddenSortSelect.dispatchEvent(new Event('change'));
                
                closeSortModal();
            });
        });

        // 2. MENGAMBIL DATA FIREBASE
        async function initFirebaseAndFetchData() {
            try {
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                
                const referensiQuery = query(collection(db, "referensi"), orderBy("createdAt", "desc"));
                const querySnapshot = await getDocs(referensiQuery);
                
                allDocuments = [];
                querySnapshot.forEach((doc) => {
                    allDocuments.push({ id: doc.id, ...doc.data() });
                });
                
                updateTableDisplay();

            } catch (error) {
                console.error("Gagal terhubung:", error);
                document.getElementById('badgeOffline').classList.remove('hidden');
                document.getElementById('rowLoading').innerHTML = `
                    <td colspan="${isAdmin ? 5 : 4}" class="px-8 py-16 text-center text-gray-400">
                        <i class="fa-solid fa-triangle-exclamation text-red-400 text-4xl mb-4 opacity-50 block"></i>
                        <span class="font-medium text-sm">Gagal memuat data. Sistem tidak terhubung.</span>
                    </td>`;
            }
        }

        function getMillis(d) {
            if (!d) return 0;
            if (d.toMillis) return d.toMillis();
            if (d.getTime) return d.getTime();
            if (typeof d === 'string') return new Date(d).getTime();
            return 0;
        }

        function sortDocuments(docs, sortBy) {
            let sortedDocs = [...docs];
            switch(sortBy) {
                case 'newest':
                    sortedDocs.sort((a, b) => getMillis(b.createdAt) - getMillis(a.createdAt));
                    break;
                case 'oldest':
                    sortedDocs.sort((a, b) => getMillis(a.createdAt) - getMillis(b.createdAt));
                    break;
                case 'name_asc':
                    sortedDocs.sort((a, b) => a.name.localeCompare(b.name));
                    break;
                case 'name_desc':
                    sortedDocs.sort((a, b) => b.name.localeCompare(a.name));
                    break;
            }
            return sortedDocs;
        }

        // 5. FUNGSI FILTER & RENDER KESELURUHAN
        function updateTableDisplay() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            // Ambil value dari hidden input (yang diatur oleh Floating Select)
            const sortBy = document.getElementById('sortSelect').value;
            
            let filteredDocs = allDocuments.filter(doc => 
                doc.name.toLowerCase().includes(searchTerm) || 
                doc.uploaderName.toLowerCase().includes(searchTerm)
            );
            
            let processedDocs = sortDocuments(filteredDocs, sortBy);
            
            renderTable(processedDocs);
        }

        // Listener tetap menggunakan hidden input 'sortSelect'
        document.getElementById('searchInput').addEventListener('input', updateTableDisplay);
        document.getElementById('sortSelect').addEventListener('change', updateTableDisplay);

        // 6. RENDER KE TABEL HTML
        function renderTable(dataArray) {
            const tbody = document.getElementById('tableBody');
            tbody.innerHTML = ''; 
            
            const colCount = isAdmin ? 5 : 4;

            if (dataArray.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="${colCount}" class="px-8 py-20 text-center text-gray-400 text-sm">
                            <div class="w-16 h-16 rounded-full bg-gray-50 flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-inbox text-2xl text-gray-300"></i>
                            </div>
                            <p class="font-medium">Tidak ada dokumen yang ditemukan.</p>
                        </td>
                    </tr>`;
                return;
            }

            dataArray.forEach(doc => {
                let displayRole = doc.uploaderRole === 'Dinkes' ? 'Admin' : doc.uploaderRole;
                
                // Pewarnaan Badge Tema Earthy (Disempurnakan agar lebih menyatu dengan tema)
                let badgeClass = "bg-gray-100 text-gray-600 border-gray-200";
                if (displayRole === 'Admin') badgeClass = 'bg-orange-50 text-sehati-primary border-orange-200';
                else if (displayRole === 'Puskesmas') badgeClass = 'bg-emerald-50 text-emerald-700 border-emerald-200';
                else if (displayRole === 'Klinik') badgeClass = 'bg-amber-50 text-amber-700 border-amber-200';
                else if (displayRole === 'Rumah Sakit') badgeClass = 'bg-stone-100 text-stone-600 border-stone-200';

                let displayDate = doc.date || "-";
                
                let actionTd = '';
                if (isAdmin) {
                    const safeName = doc.name.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                    actionTd = `
                        <td class="px-8 py-4 text-right">
                            <button onclick="window.openDeleteModal('${doc.id}', '${safeName}')" class="text-gray-400 hover:text-red-500 hover:bg-red-50 p-2.5 rounded-[12px] transition-colors border border-transparent hover:border-red-100" title="Hapus Dokumen">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    `;
                }

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50/80 transition-colors group";
                tr.innerHTML = `
                    <td class="px-8 py-5">
                        <a href="${doc.link}" target="_blank" rel="noopener noreferrer" class="flex items-start md:items-center text-sehati-primary font-bold hover:text-[#a34722] transition-colors">
                            <div class="w-8 h-8 rounded-lg bg-orange-50 flex items-center justify-center mr-3 mt-0.5 md:mt-0 flex-shrink-0 group-hover:bg-sehati-primary/10 transition-colors">
                                <i class="fa-regular fa-file-pdf text-sehati-primary/70 group-hover:text-sehati-primary transition-colors"></i>
                            </div>
                            <span class="line-clamp-2 pr-2 text-[13px] md:text-sm">${doc.name}</span>
                            <i class="fa-solid fa-arrow-up-right-from-square text-[10px] opacity-0 group-hover:opacity-100 transition-opacity ml-auto md:ml-0 flex-shrink-0"></i>
                        </a>
                    </td>
                    <td class="px-6 py-5 font-semibold text-gray-600 text-[13px] hidden sm:table-cell">${doc.uploaderName}</td>
                    <td class="px-6 py-5">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-wider border whitespace-nowrap ${badgeClass}">
                            ${displayRole}
                        </span>
                    </td>
                    <td class="px-6 py-5 text-gray-500 text-xs font-medium hidden md:table-cell whitespace-nowrap">${displayDate}</td>
                    ${actionTd}
                `;
                tbody.appendChild(tr);
            });
        }

        // 7. FUNGSI MENYIMPAN DATA (UPLOAD FORM)
        if (canUpload) {
            const form = document.getElementById('uploadForm');
            const alertBox = document.getElementById('alertBox');
            const alertText = document.getElementById('alertText');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                alertBox.classList.add('hidden'); 

                const docName = document.getElementById('inputDocName').value;
                const docLink = document.getElementById('inputLink').value;

                if (!docName || docName.trim() === '') {
                    alertText.textContent = "Silakan isi nama dokumen referensi.";
                    alertBox.classList.remove('hidden'); return;
                }
                
                if (!docLink.trim() || (!docLink.startsWith('http://') && !docLink.startsWith('https://'))) {
                    alertText.textContent = "Tautan harus valid dan diawali dengan http:// atau https://";
                    alertBox.classList.remove('hidden'); return;
                }

                const btnSubmit = document.getElementById('btnSubmit');
                
                btnSubmit.disabled = true;
                btnSubmit.classList.add('opacity-70', 'cursor-not-allowed');
                btnSubmit.innerHTML = `<div class="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div> Menyimpan...`;

                try {
                    const today = new Date().toISOString().split('T')[0];
                    const newDoc = {
                        name: docName,
                        link: docLink,
                        uploaderRole: userRole,
                        uploaderName: userName,
                        date: today,
                        createdAt: serverTimestamp() 
                    };

                    const docRef = await addDoc(collection(db, "referensi"), newDoc);
                    
                    const newDocToDisplay = { id: docRef.id, ...newDoc, createdAt: new Date() };
                    allDocuments.push(newDocToDisplay); 
                    
                    updateTableDisplay(); 
                    
                    document.getElementById('inputDocName').value = "";
                    document.getElementById('inputLink').value = "";

                } catch (error) {
                    console.error("Gagal menambah dokumen: ", error);
                    alertText.textContent = "Terjadi kesalahan sistem. Pastikan koneksi internet stabil.";
                    alertBox.classList.remove('hidden');
                } finally {
                    btnSubmit.disabled = false;
                    btnSubmit.classList.remove('opacity-70', 'cursor-not-allowed');
                    btnSubmit.innerHTML = `<i class="fa-solid fa-cloud-arrow-up group-hover:-translate-y-0.5 transition-transform"></i> <span id="btnSubmitText">Simpan ke Cloud</span>`;
                }
            });
        }

        // 8. LOGIKA MODAL HAPUS
        window.openDeleteModal = (id, name) => {
            docToDeleteId = id;
            document.getElementById('deleteModalText').innerHTML = `Dokumen <b>"${name}"</b> akan dihapus secara permanen.`;
            document.getElementById('deleteErrorMsg').classList.add('hidden');
            
            const modal = document.getElementById('deleteModal');
            const modalContent = document.getElementById('deleteModalContent');
            
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
        };

        const closeDeleteModal = () => {
            const modal = document.getElementById('deleteModal');
            const modalContent = document.getElementById('deleteModalContent');
            
            modalContent.classList.remove('scale-100', 'opacity-100');
            modalContent.classList.add('scale-95', 'opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                modal.classList.remove('flex');
                docToDeleteId = null;
            }, 200);
        };

        document.getElementById('btnCancelDelete').addEventListener('click', closeDeleteModal);

        document.getElementById('btnConfirmDelete').addEventListener('click', async () => {
            if (!docToDeleteId) return;
            
            const btn = document.getElementById('btnConfirmDelete');
            const originalContent = btn.innerHTML;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> Menghapus...`;
            btn.disabled = true;
            document.getElementById('deleteErrorMsg').classList.add('hidden');

            try {
                await deleteDoc(doc(db, "referensi", docToDeleteId));
                allDocuments = allDocuments.filter(d => d.id !== docToDeleteId);
                
                updateTableDisplay();
                closeDeleteModal();
                
            } catch (error) {
                console.error("Gagal menghapus:", error);
                const errorEl = document.getElementById('deleteErrorMsg');
                errorEl.textContent = "Gagal menghapus dokumen. Pastikan hak akses Anda.";
                errorEl.classList.remove('hidden');
            } finally {
                btn.innerHTML = originalContent;
                btn.disabled = false;
            }
        });

    </script>
</body>
</html>
